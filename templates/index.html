<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask App - Tasks & Users Dashboard</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px;
            line-height: 1.6; 
            /* Gradient background for glassmorphism */
            background: linear-gradient(135deg, #6e8efb, #a777e3); 
            color: #333; /* Texto oscuro para mejor contraste */
            min-height: 100vh;
            background-size: cover;
            background-attachment: fixed;
        }
        h1 { 
            text-align: center; 
            color: #fff; /* El título fuera de las tarjetas queda en blanco */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }
        .container { 
            display: flex; 
            gap: 30px; 
            justify-content: space-between; 
            flex-wrap: wrap; 
        }
        .section { 
            flex: 1; 
            min-width: 320px; 
            /* Tarjetas de cristal más opacas (blancas) para una lectura perfecta */
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.8); 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15); 
            transition: transform 0.3s ease;
        }
        .section:hover {
            transform: translateY(-5px);
        }
        h2 { 
            margin-top: 0; 
            color: #111; 
            border-bottom: 2px solid rgba(0, 0, 0, 0.1); 
            padding-bottom: 10px; 
        }
        
        .glass-panel {
            margin-bottom: 20px; 
            background: rgba(255, 255, 255, 0.5); 
            padding: 15px; 
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.8); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0;
            margin-top: 20px; 
            font-size: 14px; 
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        th, td { 
            padding: 12px 15px; 
            text-align: left; 
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        th { 
            background-color: rgba(0, 0, 0, 0.08); 
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
            color: #222;
        }
        tr:last-child td { border-bottom: none; }
        
        form { display: grid; gap: 12px; margin-bottom: 25px; }
        
        input[type="text"], select { 
            padding: 10px 15px; 
            background: rgba(255, 255, 255, 0.8);
            color: #222;
            border: 1px solid rgba(0, 0, 0, 0.15); 
            border-radius: 8px; 
            width: 100%; 
            box-sizing: border-box; 
            outline: none;
            transition: background 0.3s, border 0.3s;
            font-family: inherit;
        }
        input[type="text"]::placeholder {
            color: rgba(0, 0, 0, 0.5);
        }
        input[type="text"]:focus, select:focus {
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.4); 
        }
        select option {
            background: #fff;
            color: #333;
        }

        button { 
            padding: 10px 18px; 
            cursor: pointer; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,123,255,0.2);
        }
        button:hover { 
            background: #0056b3; 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,123,255,0.3);
        }
        
        .btn-danger { background: #dc3545; box-shadow: 0 4px 6px rgba(220,53,69,0.2); }
        .btn-danger:hover { background: #c82333; box-shadow: 0 6px 12px rgba(220,53,69,0.3); }
        
        .btn-success { background: #28a745; box-shadow: 0 4px 6px rgba(40,167,69,0.2); }
        .btn-success:hover { background: #218838; box-shadow: 0 6px 12px rgba(40,167,69,0.3); }
        
        .btn-warning { background: #ffc107; color: #111; box-shadow: 0 4px 6px rgba(255,193,7,0.2); }
        .btn-warning:hover { background: #e0a800; box-shadow: 0 6px 12px rgba(255,193,7,0.3); }
        
        .actions { display: flex; gap: 8px; }
        
        p { color: #555; text-shadow: none; }
    </style>
</head>
<body>
    <h1>Flask Management Dashboard</h1>
    <div class="container">
        
        <!-- TASKS SECTION -->
        <div class="section">
            <h2>Tasks</h2>
            
            <!-- User Selector for Tasks -->
            <div class="glass-panel">
                <label for="current-user-select"><strong>Current User:</strong></label>
                <select id="current-user-select" style="margin-top: 8px;" onchange="fetchTasks()">
                    <option value="">-- Select a User to manage tasks --</option>
                </select>
                <p style="font-size: 13px; margin: 10px 0 0 0;">Selecciona un usuario de la lista para ver y crear sus tareas.</p>
            </div>

            <!-- Form to create Tasks -->
            <form id="task-form" style="display: none;">
                <input type="text" id="task-content" placeholder="New task to do..." required>
                <div style="display: flex; gap: 5px;">
                    <button type="submit" id="task-submit-btn">Add Task</button>
                    <button type="button" id="task-cancel-btn" class="btn-danger" style="display: none;" onclick="cancelTaskEdit()">Cancel</button>
                </div>
            </form>
            
            <!-- Table to visualize Tasks -->
            <table id="tasks-table" style="display: none;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Content</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tasks-table-body">
                    <!-- Data will be loaded here via JS -->
                </tbody>
            </table>
            
            <p id="no-user-message" style="text-align: center; color: #888;">No user selected.</p>
        </div>

        <!-- USERS SECTION -->
        <div class="section">
            <h2>Users</h2>
            <!-- Form to create Users -->
            <form id="user-form">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="user-name" placeholder="First Name" required>
                    <input type="text" id="user-lastname" placeholder="Last Name" required>
                </div>
                <input type="text" id="user-city" placeholder="City">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="user-country" placeholder="Country">
                    <input type="text" id="user-postal" placeholder="Postal Code">
                </div>
                <div style="display: flex; gap: 5px;">
                    <button type="submit" id="user-submit-btn">Add User</button>
                    <button type="button" id="user-cancel-btn" class="btn-danger" style="display: none;" onclick="cancelUserEdit()">Cancel</button>
                </div>
            </form>
            
            <!-- Table to visualize Users -->
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Address</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-table-body">
                    <!-- Data will be loaded here via JS -->
                </tbody>
            </table>
        </div>

    </div>

    <script>
        let currentTaskId = null;
        let currentUserId = null;

        /** ==============================
         *  TASKS LOGIC
         *  ============================== */
        async function fetchTasks() {
            const userSelect = document.getElementById('current-user-select');
            const userId = userSelect.value;
            const tbody = document.getElementById('tasks-table-body');
            const taskForm = document.getElementById('task-form');
            const tasksTable = document.getElementById('tasks-table');
            const noUserMsg = document.getElementById('no-user-message');
            
            tbody.innerHTML = '';
            
            if (!userId) {
                taskForm.style.display = 'none';
                tasksTable.style.display = 'none';
                noUserMsg.style.display = 'block';
                return;
            }
            
            taskForm.style.display = 'grid';
            tasksTable.style.display = 'table';
            noUserMsg.style.display = 'none';

            const res = await fetch(`/users/${userId}`);
            if (!res.ok) return;
            const data = await res.json();
            
            if (data.user && data.user.tasks) {
                data.user.tasks.forEach(task => {
                    const tr = document.createElement('tr');
                    const safeContent = task.content.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                    tr.innerHTML = `
                        <td>${task.id}</td>
                        <td>${task.content}</td>
                        <td>${task.done ? '✅ Done' : '⏳ Pending'}</td>
                        <td class="actions">
                            <button class="btn-success" onclick="toggleTask(${task.id}, ${task.done})"> Done? </button>
                            <button class="btn-warning" onclick="editTask(${task.id}, '${safeContent}')">Edit</button>
                            <button class="btn-danger" onclick="deleteTask(${task.id})">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        function editTask(id, content) {
            currentTaskId = id;
            document.getElementById('task-content').value = content;
            document.getElementById('task-submit-btn').textContent = 'Update Task';
            document.getElementById('task-cancel-btn').style.display = 'inline-block';
        }

        function cancelTaskEdit() {
            currentTaskId = null;
            document.getElementById('task-form').reset();
            document.getElementById('task-submit-btn').textContent = 'Add Task';
            document.getElementById('task-cancel-btn').style.display = 'none';
        }

        document.getElementById('task-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent page reload
            const content = document.getElementById('task-content').value;
            const userId = document.getElementById('current-user-select').value;
            
            if (currentTaskId !== null) {
                await fetch(`/tasks/${currentTaskId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                cancelTaskEdit();
            } else {
                await fetch('/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, user_id: userId })
                });
                document.getElementById('task-form').reset();
            }
            fetchTasks(); // Reload table
        });

        async function toggleTask(id, currentStatus) {
            await fetch(`/tasks/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ done: !currentStatus })
            });
            fetchTasks();
        }

        async function deleteTask(id) {
            await fetch(`/tasks/${id}`, { method: 'DELETE' });
            fetchTasks();
        }

        /** ==============================
         *  USERS LOGIC
         *  ============================== */
        async function fetchUsers() {
            const res = await fetch('/users');
            const data = await res.json();
            const tbody = document.getElementById('users-table-body');
            const userSelect = document.getElementById('current-user-select');
            const currentSelectedUser = userSelect.value;
            
            tbody.innerHTML = '';
            userSelect.innerHTML = '<option value="">-- Select a User to manage tasks --</option>';
            
            if (data.users) {
                data.users.forEach(user => {
                    // Populate table
                    const tr = document.createElement('tr');
                    const addr = user.address;
                    const addressString = `${addr.city || 'N/A'}, ${addr.country || 'N/A'} (${addr.postal_code || '-'})`;
                    
                    const safeName = user.name.replace(/'/g, "\\'");
                    const safeLast = user.lastname.replace(/'/g, "\\'");
                    const safeCity = addr.city ? addr.city.replace(/'/g, "\\'") : '';
                    const safeCountry = addr.country ? addr.country.replace(/'/g, "\\'") : '';
                    const safePostal = addr.postal_code ? addr.postal_code.replace(/'/g, "\\'") : '';

                    tr.innerHTML = `
                        <td>${user.id}</td>
                        <td><b>${user.name} ${user.lastname}</b></td>
                        <td>${addressString}</td>
                        <td class="actions">
                            <button class="btn-warning" onclick="editUser(${user.id}, '${safeName}', '${safeLast}', '${safeCity}', '${safeCountry}', '${safePostal}')">Edit</button>
                            <button class="btn-danger" onclick="deleteUser(${user.id})">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);

                    // Populate select
                    const option = document.createElement('option');
                    option.value = user.id;
                    option.textContent = `${user.name} ${user.lastname} (ID: ${user.id})`;
                    if (user.id == currentSelectedUser) {
                        option.selected = true;
                    }
                    userSelect.appendChild(option);
                });
            }
            
            // Refresh tasks based on the (potentially) updated selection
            fetchTasks();
        }

        function editUser(id, name, lastname, city, country, postal) {
            currentUserId = id;
            document.getElementById('user-name').value = name;
            document.getElementById('user-lastname').value = lastname;
            document.getElementById('user-city').value = city;
            document.getElementById('user-country').value = country;
            document.getElementById('user-postal').value = postal;
            
            document.getElementById('user-submit-btn').textContent = 'Update User';
            document.getElementById('user-cancel-btn').style.display = 'inline-block';
        }

        function cancelUserEdit() {
            currentUserId = null;
            document.getElementById('user-form').reset();
            document.getElementById('user-submit-btn').textContent = 'Add User';
            document.getElementById('user-cancel-btn').style.display = 'none';
        }

        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('user-name').value;
            const lastname = document.getElementById('user-lastname').value;
            const city = document.getElementById('user-city').value;
            const country = document.getElementById('user-country').value;
            const postal_code = document.getElementById('user-postal').value;

            const payload = {
                name, 
                lastname,
                address: { city, country, postal_code }
            };

            if (currentUserId !== null) {
                await fetch(`/users/${currentUserId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                cancelUserEdit();
            } else {
                await fetch('/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                document.getElementById('user-form').reset();
            }
            fetchUsers();
        });

        async function deleteUser(id) {
            await fetch(`/users/${id}`, { method: 'DELETE' });
            fetchUsers();
        }

        // Initially load both tables when page starts
        window.onload = () => {
            fetchUsers();
            // fetchTasks is automatically called at the end of fetchUsers via fetchTasks()
        };
    </script>
</body>
</html>
